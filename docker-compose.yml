version: "3.9"

services:

  mongodb:
    image: mongo:7
    container_name: mern-mongodb
    restart: always
    volumes:
      - mongo-data:/data/db
    networks:
      - mern-network
    ports:
      - "27017:27017"
    healthcheck:
      interval: 30s
      timeout: 10s
      retries: 5
  backend:
    build: ./backend
    container_name: mern-backend
    restart: always
    depends_on:
     - mongodb
    env_file:
     - ./backend/.env
    networks:
      - mern-network
    ports:
      - "5000:5000"
    healthcheck:
      interval: 30s
      timeout: 10s
      retries: 3
    user: "1000:1000"
    read_only: true

  frontend:
    build: ./frontend
    container_name: mern-frontend
    restart: always
    depends_on:
     - backend
    networks:
      - mern-network
    ports:
      - "3000:3000"
    healthcheck:
      interval: 30s
      timeout: 10s
      retries: 3
    user: "1000:1000"
    read_only: true

volumes:
  mongo-data:

networks:
  mern-network:
    driver: bridge
